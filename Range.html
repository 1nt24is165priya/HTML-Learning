<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range Input element</title>
</head>
<body>
    <form action = "/server">
        <label for = "vol">Select ur volume level</label>
        <input type = "range" min = "0" max = "100" id = "vol" name = "volume" step = "10" value = "70"/>
        <button>submit</button>

    </form>
    
</body>
</html>
